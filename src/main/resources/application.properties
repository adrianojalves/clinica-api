# configurations for production
spring.application.name=clinica-api

spring.datasource.url=jdbc:mariadb://localhost:3306/clinica_prod_db
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

api.security.token.secret=${JWT_SECRET}
api.security.cookie.secure=true

# Separate origins with a comma if there is more than one frontend (e.g., http://localhost:4200,https://mysystem.com)
api.cors.allowed-origins=http://localhost:4200